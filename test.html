<!doctype html> 
<html lang="en"> 
<head> 
   <meta charset="UTF-8" />
   <title>Phaser Game with Mode Toggle</title>
   <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
   <style type="text/css">
      body {
         margin: 0;
         background-color: #222;
      }
      canvas {
         cursor: none; /* Hide the default cursor */
      }
      #modeDisplay {
         position: absolute;
         top: 10px;
         left: 10px;
         color: white;
         font-family: Arial, sans-serif;
         font-size: 16px;
         background-color: rgba(0, 0, 0, 0.7);
         padding: 10px;
         border-radius: 5px;
         z-index: 1000;
      }
   </style>
</head>
<body>
   <div id="modeDisplay">Mode: Mouse Follow (Press M to toggle)</div>

<script type="text/javascript">
    
    var config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        physics: {
            default: 'arcade',
            arcade: {
                    gravity: { y: 300 },
                    debug: true
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var water;
    var fire;
    var cursor;
    var cursors;
    var platforms;
    var mouseX = 400;
    var mouseY = 300;
    var controlMode = 'mouse'; // 'mouse' or 'arrows'
    var MKey; // For M key detection

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('water', 'assets/water.png');
        this.load.image('fire', 'assets/fire.png');
        this.load.image('cursor', 'assets/cursor.png');
        this.load.image('ground', 'assets/platform.png');
    }

    function create ()
    {
        cursors = this.input.keyboard.createCursorKeys();
        this.nextPrintTime = 0;
        
        // Create M key object
        MKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.M);
        
        
        // Create platforms
        platforms = this.physics.add.staticGroup();
        platforms.create(400, 568, 'ground').setScale(2).refreshBody();
        
        
        // Create sprites
        water = this.physics.add.sprite(20, 100, 'water');
        water.setScale(0.5);

        waterGroup = this.physics.add.group();
        waterGroup.add(water);

        fire = this.physics.add.sprite(700, 500, 'fire');
        fire.setScale(0.5);
        fire.body.allowGravity = false;

        fireGroup = this.physics.add.staticGroup(
            {key: 'fire', repeat: 3, setXY: { x: 700, y: 100, stepY: 120 }}
            
        );
        fire.destroy();

        fireGroup.children.iterate(function (child) {
            child.setScale(0.5);
            child.body.allowGravity = false;
            child.refreshBody();
        });

        this.physics.add.collider(fireGroup, waterGroup, function(fireCollide, waterCollide){
            fireCollide.destroy();
            water.setVelocity()
            console.log('hit');
        }.bind(this));

        // Create cursor sprite
        cursor = this.physics.add.sprite(mouseX, mouseY, 'cursor');
        cursor.setScale(1);
        cursor.body.allowGravity = false;
        
        // Set up water physics
        water.setBounce(0.1);
        water.setCollideWorldBounds(true);
        this.physics.add.collider(water, platforms);
        
        // Set up mouse input
        this.input.on('pointermove', function (pointer) {
            mouseX = pointer.x;
            mouseY = pointer.y;
        }, this);
        
        // Update mode display
        updateModeDisplay();

    }

    function update ()
    {
        
        // Check for M key press to toggle mode
        if (Phaser.Input.Keyboard.JustDown(MKey)) {
            toggleControlMode();
        }
        
        // Handle controls based on current mode
        if (controlMode === 'mouse') {
            handleMouseMode();
        } else {
            handleArrowMode();
        }

        if (this.input.keyboard.checkDown(this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE), 500)) {
            console.log('test');
            water.setVelocity(200, -100);
        }


    }
    
    function toggleControlMode()
    {
        if (controlMode === 'mouse') {
            controlMode = 'arrows';
            // Stop cursor movement when switching to arrow mode
            cursor.setVelocity(0, 0);
        } else {
            controlMode = 'mouse';
            // Snap cursor to mouse position when switching to mouse mode
            cursor.x = mouseX;
            cursor.y = mouseY;
            cursor.setVelocity(0, 0);
        }
        updateModeDisplay();
    }
    
    function handleMouseMode()
    {
        // Cursor follows mouse directly
        cursor.x = mouseX;
        cursor.y = mouseY;
        cursor.setVelocity(0, 0); // Ensure no leftover velocity
    }
    
    function handleArrowMode()
    {
        // Cursor controlled by arrow keys
        var speed = 200;
        
        // Reset velocity
        cursor.setVelocity(0, 0);
        
        // Apply arrow key movements
        if (cursors.left.isDown) {
            cursor.setVelocityX(-speed);
        } else if (cursors.right.isDown) {
            cursor.setVelocityX(speed);
        }
        
        if (cursors.up.isDown) {
            cursor.setVelocityY(-speed);
        } else if (cursors.down.isDown) {
            cursor.setVelocityY(speed);
        }

    }
    
    
    function updateModeDisplay()
    {
        var display = document.getElementById('modeDisplay');
        var modeText = controlMode === 'mouse' ? 'Mouse Follow' : 'Arrow Keys';
        var color = controlMode === 'mouse' ? '#4CAF50' : '#2196F3';
        
        display.innerHTML = `Mode: <span style="color: ${color}; font-weight: bold;">${modeText}</span><br>Press M to toggle`;
    }

    function shootWater(water){
        accelerateToObject(water, cursor, 10)
    }

</script>

</body>
</html>
