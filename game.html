<!doctype html> 
<html lang="en"> 
<head> 
   <meta charset="UTF-8" />
   <title>Making your first Phaser 3 Game - Part 1</title>
   <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
   <style type="text/css">
      body {
         margin: 0;
      }
   </style>
</head>
<body>

<script type="text/javascript">
	
	var config = {
		type: Phaser.AUTO,
		width: 800,
		height: 600,
		physics: {
			default: 'arcade',
			arcade: {
					gravity: { y: 300 },
					debug: false
			}
		},
		scene: {
			preload: preload,
			create: create,
			update: update
		}
	};

	var water;
	var fire;
	var cursor;

	var game = new Phaser.Game(config);

	function preload ()
	{
		this.load.image('water', 'assets/water.png');
		this.load.image('fire', 'assets/fire.png');
		this.load.image('cursor', 'assets/cursor.png');
	}

	function create ()
		{
			this.add.image(400, 300, 'fire');
	
		water = this.physics.add.sprite(20, 100, 'water');
		water.setscale(1);
		fire = this.physics.add.sprite(200, 450, 'fire');
		fire.setscale(0.5);
		cursor = this.physics.add.sprite(300, 450, 'cursor');
		cursor.setscale(0.5);
	}

	function update ()
    {
    }

	// function shootWater() {
	// 	this.physics.accelerateToObject(water, cursor, 60, 200, 200);
	// }
</script>

</body>
</html>
