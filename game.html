<!doctype html> 
<html lang="en"> 
<head> 
   <meta charset="UTF-8" />
   <title>Making your first Phaser 3 Game - Part 1</title>
   <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
   <style type="text/css">
      body {
         margin: 0;
      }
   </style>
</head>
<body>

<script type="text/javascript">
	
	var config = {
		type: Phaser.AUTO,
		width: 800,
		height: 600,
		physics: {
			default: 'arcade',
			arcade: {
					gravity: { y: 300 },
					debug: true
			}
		},
		scene: {
			preload: preload,
			create: create,
			update: update
		}
	};

	var water;
	var fire;
	var cursor;
	var cursors;
	var platforms;

	var game = new Phaser.Game(config);

	function preload ()
	{
		this.load.image('water', 'assets/water.png');
		this.load.image('fire', 'assets/fire.png');
		this.load.image('cursor', 'assets/cursor.png');
		this.load.image('ground', 'assets/platform.png');
	}

	function create ()
	{
		cursors = this.input.keyboard.createCursorKeys();
		this.add.image(700, 100, 'fire');
		this.add.image(700, 300, 'fire');
		this.add.image(700, 500, 'fire');
		
		platforms = this.physics.add.staticGroup();

		platforms.create(400, 568, 'ground').setScale(2).refreshBody();
	
		water = this.physics.add.sprite(20, 100, 'water');
		water.setScale(1);
		fire = this.physics.add.sprite(200, 450, 'fire');
		fire.setScale(0.5);
		cursor = this.physics.add.sprite(100, 100, 'cursor');
		cursor.setScale(1);
		cursor.body.allowGravity = false;
		water.setBounce(0.1);
		water.setCollideWorldBounds(true);
		this.physics.add.collider(water, platforms);

	}

	function update ()
    {
		if (cursors.left.isDown)
        {
            cursor.setVelocityX(-160);
        }
        else if (cursors.right.isDown)
        {
            cursor.setVelocityX(160);
        }
        else if (cursors.up.isDown)
		{
			cursor.setVelocityY(-160);
		}
		else if (cursors.down.isDown)
		{
			cursor.setVelocityY(160);
		}
		else
		{
            cursor.setVelocityX(0);
            cursor.setVelocityY(0);
        }
	
    }

	// function shootWater(water, cursor) {
		
	// 	if (cursors.space.isDown)
	// 	{
	// 		this.physics.accelerateToObject(water, cursor, 60, 200, 200);
	// 	}
	// }
</script>

</body>
</html>
